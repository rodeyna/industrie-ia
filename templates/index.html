<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INDUSTRIE IA</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: #2a2a3d; --accent: #00e5a0; --accent2: #0066ff;
    --warn: #ff6b35; --text: #e8e8f0; --muted: #6b6b8a;
    --font-mono: 'Space Mono', monospace; --font-body: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px; opacity: 0.3; pointer-events: none;
  }
  .container { max-width: 700px; margin: 0 auto; padding: 3rem 1.5rem; position: relative; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 3rem; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark { width: 36px; height: 36px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; }
  .logo-mark svg { width: 18px; height: 18px; }
  .logo-text h1 { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--text); letter-spacing: 0.05em; }
  .logo-text p { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .status-pill { font-family: var(--font-mono); font-size: 11px; color: var(--accent); border: 1px solid var(--accent); padding: 4px 10px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .upload-zone {
    border: 1px dashed var(--border); padding: 3rem 2rem; text-align: center;
    cursor: pointer; transition: all 0.2s; background: var(--surface);
    position: relative; overflow: hidden; margin-bottom: 12px;
  }
  .upload-zone::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, transparent 40%, rgba(0,229,160,0.03) 100%); }
  .upload-zone:hover { border-color: var(--accent); }
  .upload-zone.has-file { border-color: var(--accent); border-style: solid; }
  .upload-icon { font-family: var(--font-mono); font-size: 32px; color: var(--accent); margin-bottom: 14px; }
  .upload-title { font-family: var(--font-mono); font-size: 14px; color: var(--text); margin-bottom: 8px; }
  .upload-sub { font-size: 13px; color: var(--muted); }
  .upload-filename { font-family: var(--font-mono); font-size: 12px; color: var(--accent); margin-top: 10px; }
  .btn-run {
    width: 100%; padding: 16px; background: var(--accent); color: #000; border: none;
    font-family: var(--font-mono); font-size: 14px; font-weight: 700;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; margin-bottom: 2rem;
  }
  .btn-run:hover:not(:disabled) { background: #00ffb3; }
  .btn-run:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
  .btn-run.running { background: var(--surface2); color: var(--accent); border: 1px solid var(--accent); }
  .progress-section { margin-bottom: 1.5rem; display: none; }
  .progress-section.visible { display: block; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
  .progress-pct { font-family: var(--font-mono); font-size: 12px; color: var(--accent); }
  .progress-track { height: 2px; background: var(--border); }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.6s ease; width: 0%; }
  .terminal { background: var(--surface); border: 1px solid var(--border); overflow: hidden; display: none; margin-bottom: 2rem; }
  .terminal.visible { display: block; }
  .terminal-bar { background: var(--surface2); padding: 8px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
  .t-dot { width: 8px; height: 8px; border-radius: 50%; }
  .terminal-bar span { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-left: 4px; }
  .terminal-body { padding: 14px; max-height: 220px; overflow-y: auto; font-family: var(--font-mono); font-size: 12px; line-height: 1.9; }
  .log-line { color: var(--muted); }
  .log-line.info { color: var(--accent); }
  .log-line.api  { color: var(--accent2); }
  .log-line.warn { color: var(--warn); }
  .outputs-section { display: none; margin-bottom: 2rem; }
  .outputs-section.visible { display: block; }
  .outputs-label { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 12px; }
  .files-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
  .file-card { background: var(--surface); border: 1px solid var(--border); padding: 14px 12px; cursor: pointer; transition: all 0.2s; text-align: center; }
  .file-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .file-ext { font-family: var(--font-mono); font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .file-name { font-size: 11px; color: var(--muted); word-break: break-all; }
  .ext-pdf { color: var(--warn); } .ext-xlsx { color: #00c853; } .ext-html { color: var(--accent2); }
  .ext-json { color: #ffd740; } .ext-xml { color: #cc99ff; } .ext-dxf { color: var(--accent); }
  .error-banner { background: rgba(255,107,53,0.1); border: 1px solid var(--warn); padding: 12px 14px; margin-bottom: 1rem; font-family: var(--font-mono); font-size: 12px; color: var(--warn); display: none; }
  .error-banner.visible { display: block; }
  .api-bar { background: var(--surface2); border: 1px solid var(--border); padding: 12px 14px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .api-item { font-family: var(--font-mono); font-size: 11px; }
  .api-item span { color: var(--muted); }
  .api-item a { color: var(--accent2); text-decoration: none; }
  .api-item a:hover { text-decoration: underline; }
  .divider { width: 1px; height: 16px; background: var(--border); }
</style>
</head>
<body>
<div class="container">
 
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="6" height="6" stroke="#00e5a0" stroke-width="1.5"/>
          <rect x="11" y="1" width="6" height="6" stroke="#00e5a0" stroke-width="1.5"/>
          <rect x="1" y="11" width="6" height="6" stroke="#00e5a0" stroke-width="1.5"/>
          <rect x="11" y="11" width="6" height="6" stroke="#0066ff" stroke-width="1.5"/>
        </svg>
      </div>
      <div class="logo-text">
        <h1>INDUSTRIE IA</h1>
        <p>OpenIndustry Algeria — AI Pipeline v1.0</p>
      </div>
    </div>
    <div class="status-pill"><div class="dot"></div>API READY</div>
  </div>
 
  <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="upload-icon">[ PDF ]</div>
    <div class="upload-title" id="uploadTitle">DROP TECHNICAL DRAWING HERE</div>
    <div class="upload-sub" id="uploadSub">GrabCAD · Thingiverse · Open Parts Library</div>
    <div class="upload-filename" id="uploadFilename"></div>
    <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="onFile(event)">
  </div>
 
  <button class="btn-run" id="runBtn" disabled onclick="runPipeline()">
    RUN INDUSTRIE IA PIPELINE →
  </button>
 
  <div class="progress-section" id="progressSection">
    <div class="progress-header">
      <span class="progress-label" id="progressLabel">INITIALIZING...</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
 
  <div class="error-banner" id="errorBanner"></div>
 
  <div class="terminal" id="terminal">
    <div class="terminal-bar">
      <div class="t-dot" style="background:#ff5f57"></div>
      <div class="t-dot" style="background:#febc2e"></div>
      <div class="t-dot" style="background:#28c840"></div>
      <span>industrie-ia — pipeline log</span>
    </div>
    <div class="terminal-body" id="termBody"></div>
  </div>
 
  <div class="outputs-section" id="outputsSection">
    <div class="outputs-label">// GENERATED FILES — CLICK TO DOWNLOAD</div>
    <div class="files-grid" id="filesGrid"></div>
  </div>
 
  <div class="api-bar">
    <div class="api-item"><span>docs →</span> <a href="/docs" target="_blank">/docs</a></div>
    <div class="divider"></div>
    <div class="api-item"><span>POST</span> <a href="/docs" target="_blank">/process</a></div>
    <div class="divider"></div>
    <div class="api-item"><span>GET</span> <a href="/catalog" target="_blank">/catalog</a></div>
    <div class="divider"></div>
    <div class="api-item"><span>GET</span> <a href="/outputs-list" target="_blank">/outputs-list</a></div>
  </div>
 
</div>
<script>
const FILES_META = [
  { ext:"JSON", name:"specs.json",        cls:"ext-json" },
  { ext:"DXF",  name:"valve_plan.dxf",    cls:"ext-dxf"  },
  { ext:"JSON", name:"suppliers.json",    cls:"ext-json" },
  { ext:"JSON", name:"negotiation.json",  cls:"ext-json" },
  { ext:"XLSX", name:"tco_report.xlsx",   cls:"ext-xlsx" },
  { ext:"PDF",  name:"business_plan.pdf", cls:"ext-pdf"  },
  { ext:"JSON", name:"digital_twin.json", cls:"ext-json" },
  { ext:"PDF",  name:"catalog.pdf",       cls:"ext-pdf"  },
  { ext:"HTML", name:"catalog.html",      cls:"ext-html" },
  { ext:"XLSX", name:"catalog.xlsx",      cls:"ext-xlsx" },
  { ext:"JSON", name:"catalog.json",      cls:"ext-json" },
  { ext:"XML",  name:"catalog.xml",       cls:"ext-xml"  },
];
 
function addLog(type, msg) {
  const body = document.getElementById("termBody");
  const line = document.createElement("div");
  line.className = "log-line " + type;
  const ts = new Date().toLocaleTimeString("en-GB", {hour12:false});
  line.textContent = "[" + ts + "] " + msg;
  body.appendChild(line);
  body.scrollTop = body.scrollHeight;
}
 
function setProgress(pct, label) {
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressPct").textContent = pct + "%";
  document.getElementById("progressLabel").textContent = label;
}
 
function onFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  document.getElementById("uploadTitle").textContent = f.name;
  document.getElementById("uploadSub").textContent = (f.size/1024).toFixed(1) + " KB — ready to process";
  document.getElementById("dropZone").classList.add("has-file");
  document.getElementById("runBtn").disabled = false;
}
 
async function runPipeline() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return;
 
  document.getElementById("runBtn").disabled = true;
  document.getElementById("runBtn").textContent = "PIPELINE RUNNING...";
  document.getElementById("runBtn").classList.add("running");
  document.getElementById("progressSection").classList.add("visible");
  document.getElementById("terminal").classList.add("visible");
  document.getElementById("errorBanner").classList.remove("visible");
 
  setProgress(5, "SENDING PDF TO PIPELINE...");
  addLog("info", "Uploading PDF to FastAPI...");
 
  const formData = new FormData();
  formData.append("file", file);
 
  try {
    addLog("api", "POST /process — starting LangGraph pipeline...");
    setProgress(10, "PIPELINE RUNNING — PLEASE WAIT...");
 
    const response = await fetch("/process", {
      method: "POST",
      body: formData
    });
 
    if (!response.ok) throw new Error("Server error: " + response.status + " " + response.statusText);
 
const result = await response.json();
setProgress(100, "PIPELINE COMPLETE");
addLog("info", "Pipeline finished successfully");

// Log real data from each module
if (result.specs) {
    const brand = result.specs.identity?.brand || result.specs.part_name || "extracted";
    const mat   = result.specs.materials?.body_stainless_steel || result.specs.material || "found";
    addLog("info", "[M1] Part: " + brand);
    addLog("info", "[M1] Material: " + mat);
}
if (result.suppliers && result.suppliers.length > 0) {
    addLog("api", "[M4] " + result.suppliers.length + " suppliers found");
    const best = result.suppliers[0];
    if (best) addLog("api", "[M4] Best: " + (best.Supplier || best.name) + " — " + (best.Location || best.country));
}
if (result.tco_total) {
    addLog("info", "[M6] TCO: " + result.tco_total + " DZD");
}
if (result.catalog_files) {
    const formats = Object.keys(result.catalog_files).length;
    addLog("info", "[M9] Catalog exported in " + formats + " formats");
}

// Show errors if any
if (result.errors && result.errors.length > 0) {
    const banner = document.getElementById("errorBanner");
    banner.textContent = "⚠ " + result.errors.length + " module(s) had errors: " + result.errors.map(e => e.module).join(", ");
    banner.classList.add("visible");
    result.errors.forEach(e => addLog("warn", "[ERROR] " + e.module + ": " + e.error));
}

// Build REAL file list from what the pipeline actually generated
document.getElementById("runBtn").textContent = "✓ PIPELINE COMPLETE";
document.getElementById("outputsSection").classList.add("visible");

const realFiles = [];

// From M9 catalog — these are the main outputs user wants
if (result.catalog_files) {
    if (result.catalog_files.pdf)  realFiles.push({ ext:"PDF",  name:"catalog.pdf",  cls:"ext-pdf"  });
    if (result.catalog_files.html) realFiles.push({ ext:"HTML", name:"catalog.html", cls:"ext-html" });
    if (result.catalog_files.xlsx) realFiles.push({ ext:"XLSX", name:"catalog.xlsx", cls:"ext-xlsx" });
    if (result.catalog_files.json) realFiles.push({ ext:"JSON", name:"catalog.json", cls:"ext-json" });
    if (result.catalog_files.xml)  realFiles.push({ ext:"XML",  name:"catalog.xml",  cls:"ext-xml"  });
} else {
    // fallback — show catalog.pdf anyway
    realFiles.push({ ext:"PDF", name:"catalog.pdf", cls:"ext-pdf" });
}

// Other module outputs
realFiles.push({ ext:"XLSX", name:"tco_analysis.xlsx",   cls:"ext-xlsx" });
realFiles.push({ ext:"JSON", name:"digital_twin.json",   cls:"ext-json" });
realFiles.push({ ext:"JSON", name:"specs.json",          cls:"ext-json" });
realFiles.push({ ext:"JSON", name:"suppliers_data.json", cls:"ext-json" });

document.getElementById("filesGrid").innerHTML = realFiles.map(f =>
    '<div class="file-card" onclick="downloadFile(\'' + f.name + '\')">' +
        '<div class="file-ext ' + f.cls + '">' + f.ext + '</div>' +
        '<div class="file-name">' + f.name + '</div>' +
    '</div>'
).join("");
 
  } catch (err) {
    setProgress(0, "ERROR");
    addLog("warn", "Error: " + err.message);
    const banner = document.getElementById("errorBanner");
    banner.textContent = "✗ " + err.message;
    banner.classList.add("visible");
    document.getElementById("runBtn").disabled = false;
    document.getElementById("runBtn").textContent = "RETRY PIPELINE →";
    document.getElementById("runBtn").classList.remove("running");
  }
}
 
function downloadFile(name) {
    const a = document.createElement("a");
    a.href = "/download/" + name;   // uses new download endpoint
    a.download = name;              // tells browser to download not preview
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    addLog("info", "Downloading: " + name);
}
</script>
</body>
</html>
